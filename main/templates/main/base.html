{% load static %}
<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Talabalar Tizimi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <style>
        body {
            background: #f4f6fb;
            font-family: 'Segoe UI', sans-serif;
        }

        .sidebar {
            height: 100vh;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        .sidebar a {
            display: block;
            padding: 10px;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: #1e293b;
            color: white;
        }

        .card-custom {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- SIDEBAR -->
        <div class="col-md-2 sidebar">
            <h4>🎓 Najot Ta'lim ERP</h4>
            <hr>

            <a href="{% url 'main:home' %}">🏠 Asosiy</a>
            <a href="{% url 'main:list' %}">📋 Talabalar</a>
            <a href="{% url 'main:add' %}">➕ Qo‘shish</a>
            <a href="{% url 'main:guruhlar' %}">👥 Guruhlar</a>
            <a href="/admin/">⚙ Admin</a>
        </div>

        <!-- CONTENT -->
        <div class="col-md-10 p-4">
            {% block content %}
            {% endblock %}
        </div>

    </div>
</div>

</body>
</html>
